<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standup Siren</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Standup Siren</h1>
      <p class="tagline">Tiny tray app. Big dramatic energy.</p>

      <form id="settings-form">
        <label>
          <span>Meeting time</span>
          <input id="meetingTime" type="time" required />
        </label>

        <label>
          <span>Seconds before</span>
          <input id="offsetSeconds" type="number" min="0" max="3600" value="10" required />
        </label>

        <label class="checkbox">
          <input id="launchOnLogin" type="checkbox" />
          <span>Launch on login</span>
        </label>

        <div class="actions">
          <button type="submit">Save</button>
          <button type="button" id="testSound">Test sound</button>
        </div>
      </form>

      <section class="status">
        <strong>Next trigger:</strong>
        <span id="nextTrigger">—</span>
      </section>

      <section class="notes">
        <p>Default sound is bundled.</p>
        <p>Override it by placing <code>ring.mp3</code> in the app config directory.</p>
      </section>
    </main>

    <script type="module" src="./main.js"></script>
  </body>
</html>
